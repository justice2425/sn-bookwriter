<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manuscript</title>
<style>
  :root {
    --bg: var(--sn-stylekit-background-color, #ffffff);
    --fg: var(--sn-stylekit-foreground-color, #1a1a1a);
    --contrast-bg: var(--sn-stylekit-contrast-background-color, #f4f4f5);
    --contrast-fg: var(--sn-stylekit-contrast-foreground-color, #2a2a2a);
    --border: var(--sn-stylekit-border-color, #e3e3e6);
    --neutral: var(--sn-stylekit-neutral-color, #8a8a8f);
    --accent: var(--sn-stylekit-info-color, #2563eb);
    --editor-font: var(--sn-stylekit-editor-font-family, Georgia, "Times New Roman", serif);
    --ui-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: var(--ui-font);
    font-size: 14px;
    overflow: hidden;
  }
  #app { display: flex; height: 100vh; }

  /* ---------- Sidebar / binder ---------- */
  #sidebar {
    width: 248px; min-width: 248px; height: 100%;
    border-right: 1px solid var(--border);
    background: var(--contrast-bg);
    display: flex; flex-direction: column;
  }
  .sidebar-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 12px 8px; border-bottom: 1px solid var(--border);
  }
  .brand { font-weight: 700; letter-spacing: .02em; }
  .chapter-list { flex: 1; overflow-y: auto; padding: 6px; }
  .chapter-row {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 8px; border-radius: 6px; cursor: pointer;
    user-select: none;
  }
  .chapter-row:hover { background: var(--bg); }
  .chapter-row.active { background: var(--bg); box-shadow: inset 2px 0 0 var(--accent); }
  .chapter-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chapter-words { color: var(--neutral); font-size: 11px; }
  .chapter-row.dragging { opacity: .4; }
  .chapter-row.drag-over { outline: 2px dashed var(--accent); outline-offset: -2px; }
  .row-actions { display: none; gap: 2px; }
  .chapter-row:hover .row-actions { display: flex; }
  .icon-btn {
    border: none; background: transparent; cursor: pointer;
    color: var(--neutral); font-size: 12px; padding: 2px 4px; border-radius: 4px;
  }
  .icon-btn:hover { background: var(--contrast-bg); color: var(--fg); }
  .icon-btn.danger:hover { color: #c0392b; }

  .binder-foot {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 8px 14px; border-top: 1px solid var(--border);
  }
  .total { font-weight: 700; font-size: 16px; }
  .muted { color: var(--neutral); }
  .small { font-size: 11px; }

  .targets { padding: 10px 14px 14px; border-top: 1px solid var(--border); }
  .targets label { display: block; font-size: 11px; color: var(--neutral); margin-top: 8px; }
  .targets input {
    width: 100%; margin-top: 3px; padding: 5px 7px;
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px; font-size: 13px;
  }
  .bar { height: 6px; background: var(--border); border-radius: 4px; margin: 7px 0 2px; overflow: hidden; }
  .bar-fill { height: 100%; width: 0; background: var(--accent); transition: width .2s ease; }
  .bar-fill.done { background: #2e9e5b; }

  /* ---------- Main ---------- */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
  #toolbar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 8px 12px; border-bottom: 1px solid var(--border);
  }
  .chapter-title {
    font-size: 15px; font-weight: 600; border: none; background: transparent;
    color: var(--fg); padding: 4px 2px; min-width: 140px; flex: 0 1 220px;
  }
  .chapter-title:focus { outline: none; border-bottom: 2px solid var(--accent); }
  .fmt-group { display: flex; align-items: center; gap: 2px; }
  .fmt {
    min-width: 28px; height: 28px; border: 1px solid transparent; background: transparent;
    color: var(--fg); border-radius: 5px; cursor: pointer; font-size: 13px;
  }
  .fmt:hover { background: var(--contrast-bg); border-color: var(--border); }
  .sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
  .spacer { flex: 1; }
  .btn {
    border: 1px solid var(--border); background: var(--bg); color: var(--fg);
    border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 13px;
  }
  .btn:hover { background: var(--contrast-bg); }
  .btn.small { padding: 3px 8px; font-size: 12px; }
  .btn.ghost { background: transparent; }
  .btn.ghost.on { background: var(--accent); color: #fff; border-color: var(--accent); }

  .menu-wrap { position: relative; }
  .menu {
    position: absolute; right: 0; top: 110%; z-index: 20;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.14); padding: 4px; min-width: 180px; display: none;
  }
  .menu.open { display: block; }
  .menu button {
    display: block; width: 100%; text-align: left; border: none; background: transparent;
    color: var(--fg); padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .menu button:hover { background: var(--contrast-bg); }

  #editor-scroll { flex: 1; overflow-y: auto; display: flex; justify-content: center; }
  #editor {
    --ls: 1.5;
    --para-gap: 0.15em;
    font-family: var(--editor-font);
    font-size: var(--sn-stylekit-font-size-editor, 18px);
    line-height: var(--ls);
    max-width: 46em; width: 100%;
    padding: 40px 32px 50vh;
    outline: none;
  }
  #editor p { margin: 0 0 var(--para-gap); }
  #editor.first-indent p { text-indent: 1.6em; }
  #editor.first-indent p:first-child { text-indent: 0; }
  #editor h1 { font-size: 1.7em; margin: .6em 0 .3em; line-height: 1.25; }
  #editor h2 { font-size: 1.35em; margin: .6em 0 .3em; line-height: 1.25; }
  #editor h3 { font-size: 1.15em; margin: .6em 0 .3em; line-height: 1.25; }
  #editor ul, #editor ol { margin: 0 0 var(--para-gap); padding-left: 1.6em; }
  #editor a { color: var(--accent); }
  #editor sup.fn-ref {
    color: var(--accent); font-weight: 600; cursor: default;
    padding: 0 1px; font-size: .7em; vertical-align: super;
  }
  #editor blockquote {
    margin: 1em 0; padding-left: 1em; border-left: 3px solid var(--border);
    color: var(--neutral); font-style: italic;
  }

  /* format menu controls */
  .menu-label { font-size: 11px; color: var(--neutral); padding: 8px 10px 4px; text-transform: uppercase; letter-spacing: .04em; }
  .menu-seg { display: flex; gap: 4px; padding: 0 8px 4px; }
  .menu-seg button {
    flex: 1; border: 1px solid var(--border); background: transparent; color: var(--fg);
    padding: 5px 0; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .menu-seg button.on { background: var(--accent); color: #fff; border-color: var(--accent); }
  .menu-toggle { display: flex; align-items: center; gap: 8px; }
  .menu-toggle::before {
    content: ""; width: 14px; height: 14px; border: 1px solid var(--border); border-radius: 3px; display: inline-block;
  }
  .menu-toggle.on::before { background: var(--accent); border-color: var(--accent); }

  /* footnotes panel */
  .fn-panel {
    max-width: 46em; width: 100%; margin: 0 auto;
    border-top: 1px dashed var(--border); padding: 10px 32px 30px;
  }
  .fn-panel-head { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--neutral); margin-bottom: 6px; }
  .fn-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .fn-num { color: var(--accent); font-weight: 600; min-width: 1.4em; text-align: right; font-size: 13px; padding-top: 6px; }
  .fn-text {
    flex: 1; resize: none; overflow: hidden; min-height: 30px;
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 8px; font-family: var(--ui-font); font-size: 13px; line-height: 1.5;
  }
  body.focus-mode .fn-panel { display: none; }

  /* images, tables, citations in the editor */
  #editor img { max-width: 100%; height: auto; border-radius: 4px; }
  #editor table { border-collapse: collapse; margin: 1em 0; width: 100%; }
  #editor th, #editor td { border: 1px solid var(--border); padding: 6px 9px; min-width: 2em; }
  #editor th { background: var(--contrast-bg); font-weight: 600; }
  #editor .cite { color: var(--accent); white-space: nowrap; }
  #editor sup.cite { font-size: .8em; }

  /* floating table toolbar */
  .table-toolbar {
    position: fixed; z-index: 40; display: flex; gap: 2px;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 3px; box-shadow: 0 4px 14px rgba(0,0,0,.16);
  }
  .table-toolbar button {
    border: none; background: transparent; color: var(--fg); cursor: pointer;
    font-size: 12px; padding: 3px 7px; border-radius: 5px;
  }
  .table-toolbar button:hover { background: var(--contrast-bg); }
  .table-toolbar button.danger:hover { color: #c0392b; }

  /* modal */
  .modal {
    position: fixed; inset: 0; z-index: 60; background: rgba(0,0,0,.45);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-card {
    background: var(--bg); color: var(--fg); border: 1px solid var(--border);
    border-radius: 12px; width: 640px; max-width: 100%; max-height: 86vh; overflow-y: auto;
    box-shadow: 0 18px 50px rgba(0,0,0,.3); padding: 16px 18px;
  }
  .modal-head { display: flex; align-items: center; justify-content: space-between; font-weight: 700; font-size: 16px; margin-bottom: 12px; }
  .modal-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
  label.inline { display: flex; align-items: center; gap: 6px; font-size: 13px; }
  #citation-style { padding: 5px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--fg); }

  .sources-list { display: flex; flex-direction: column; gap: 4px; }
  .src-row { display: flex; align-items: center; gap: 8px; padding: 7px 8px; border: 1px solid var(--border); border-radius: 8px; }
  .src-label { flex: 1; font-size: 13px; }
  .row-actions.always { display: flex; gap: 3px; }

  .source-form { border: 1px solid var(--border); border-radius: 10px; padding: 12px; margin-top: 12px; background: var(--contrast-bg); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 12px; }
  .field { display: flex; flex-direction: column; font-size: 11px; color: var(--neutral); gap: 3px; }
  .field.wide { grid-column: 1 / -1; }
  .field input, .field select { padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--fg); font-size: 13px; }
  .form-bar { display: flex; gap: 8px; margin-top: 12px; }

  .ref-preview-wrap { margin-top: 14px; }
  .ref-preview-wrap summary { cursor: pointer; font-size: 12px; color: var(--neutral); text-transform: uppercase; letter-spacing: .04em; }
  .ref-preview { margin-top: 8px; font-size: 13px; }
  .ref-item { padding-left: 1.6em; text-indent: -1.6em; margin-bottom: .5em; }

  #statusbar {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-top: 1px solid var(--border);
    color: var(--neutral); font-size: 12px;
  }
  #statusbar .dot { opacity: .5; }
  .session-bar-wrap { width: 120px; height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }

  #exit-focus {
    display: none; position: absolute; top: 14px; right: 18px; z-index: 30;
    border: 1px solid var(--border); background: var(--bg); color: var(--fg);
    border-radius: 20px; padding: 6px 14px; cursor: pointer; opacity: .5;
  }
  #exit-focus:hover { opacity: 1; }

  /* ---------- Focus mode ---------- */
  body.focus-mode #sidebar { display: none; }
  body.focus-mode #toolbar { display: none; }
  body.focus-mode #statusbar { opacity: 0; transition: opacity .2s; }
  body.focus-mode #main:hover #statusbar { opacity: 1; }
  body.focus-mode #exit-focus { display: block; }
  body.focus-mode #editor { padding-top: 12vh; }
  body.focus-mode #editor > * { transition: opacity .25s ease; }
  body.focus-mode #editor > *:not(.cur-block) { opacity: .25; }

  body.locked #editor { caret-color: transparent; }
</style>
</head>
<body>
  <div id="app"></div>
  <script src="./app.js"></script>
</body>
</html>
