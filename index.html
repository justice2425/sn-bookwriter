<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manuscript</title>
<style>
  :root {
    --bg: var(--sn-stylekit-background-color, #ffffff);
    --fg: var(--sn-stylekit-foreground-color, #1a1a1a);
    --contrast-bg: var(--sn-stylekit-contrast-background-color, #f4f4f5);
    --contrast-fg: var(--sn-stylekit-contrast-foreground-color, #2a2a2a);
    --border: var(--sn-stylekit-border-color, #e3e3e6);
    --neutral: var(--sn-stylekit-neutral-color, #8a8a8f);
    --accent: var(--sn-stylekit-info-color, #2563eb);
    --editor-font: var(--sn-stylekit-editor-font-family, Georgia, "Times New Roman", serif);
    --ui-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: var(--ui-font);
    font-size: 14px;
    overflow: hidden;
  }
  #app { display: flex; height: 100vh; }

  /* ---------- Sidebar / binder ---------- */
  #sidebar {
    width: 248px; min-width: 248px; height: 100%;
    border-right: 1px solid var(--border);
    background: var(--contrast-bg);
    display: flex; flex-direction: column;
  }
  .sidebar-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 12px 8px; border-bottom: 1px solid var(--border);
  }
  .brand { font-weight: 700; letter-spacing: .02em; }
  .chapter-list { flex: 1; overflow-y: auto; padding: 6px; }
  .chapter-row {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 8px; border-radius: 6px; cursor: pointer;
    user-select: none;
  }
  .chapter-row:hover { background: var(--bg); }
  .chapter-row.active { background: var(--bg); box-shadow: inset 2px 0 0 var(--accent); }
  .chapter-name { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chapter-words { color: var(--neutral); font-size: 11px; }
  .chapter-row.dragging { opacity: .4; }
  .chapter-row.drag-over { outline: 2px dashed var(--accent); outline-offset: -2px; }
  .row-actions { display: none; gap: 2px; }
  .chapter-row:hover .row-actions { display: flex; }
  .icon-btn {
    border: none; background: transparent; cursor: pointer;
    color: var(--neutral); font-size: 12px; padding: 2px 4px; border-radius: 4px;
  }
  .icon-btn:hover { background: var(--contrast-bg); color: var(--fg); }
  .icon-btn.danger:hover { color: #c0392b; }

  .binder-foot {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 8px 14px; border-top: 1px solid var(--border);
  }
  .total { font-weight: 700; font-size: 16px; }
  .muted { color: var(--neutral); }
  .small { font-size: 11px; }

  .targets { padding: 10px 14px 14px; border-top: 1px solid var(--border); }
  .targets label { display: block; font-size: 11px; color: var(--neutral); margin-top: 8px; }
  .targets input {
    width: 100%; margin-top: 3px; padding: 5px 7px;
    background: var(--bg); color: var(--fg);
    border: 1px solid var(--border); border-radius: 6px; font-size: 13px;
  }
  .bar { height: 6px; background: var(--border); border-radius: 4px; margin: 7px 0 2px; overflow: hidden; }
  .bar-fill { height: 100%; width: 0; background: var(--accent); transition: width .2s ease; }
  .bar-fill.done { background: #2e9e5b; }

  /* ---------- Main ---------- */
  #main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }
  #toolbar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 8px 12px; border-bottom: 1px solid var(--border);
  }
  .chapter-title {
    font-size: 15px; font-weight: 600; border: none; background: transparent;
    color: var(--fg); padding: 4px 2px; min-width: 140px; flex: 0 1 220px;
  }
  .chapter-title:focus { outline: none; border-bottom: 2px solid var(--accent); }
  .fmt-group { display: flex; align-items: center; gap: 2px; }
  .fmt {
    min-width: 28px; height: 28px; border: 1px solid transparent; background: transparent;
    color: var(--fg); border-radius: 5px; cursor: pointer; font-size: 13px;
  }
  .fmt:hover { background: var(--contrast-bg); border-color: var(--border); }
  .sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px; }
  .spacer { flex: 1; }
  .btn {
    border: 1px solid var(--border); background: var(--bg); color: var(--fg);
    border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 13px;
  }
  .btn:hover { background: var(--contrast-bg); }
  .btn.small { padding: 3px 8px; font-size: 12px; }
  .btn.ghost { background: transparent; }
  .btn.ghost.on { background: var(--accent); color: #fff; border-color: var(--accent); }

  .menu-wrap { position: relative; }
  .menu {
    position: absolute; right: 0; top: 110%; z-index: 20;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.14); padding: 4px; min-width: 180px; display: none;
  }
  .menu.open { display: block; }
  .menu button {
    display: block; width: 100%; text-align: left; border: none; background: transparent;
    color: var(--fg); padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 13px;
  }
  .menu button:hover { background: var(--contrast-bg); }

  #editor-scroll { flex: 1; overflow-y: auto; display: flex; justify-content: center; }
  #editor {
    font-family: var(--editor-font);
    font-size: var(--sn-stylekit-font-size-editor, 18px);
    line-height: 1.7;
    max-width: 46em; width: 100%;
    padding: 40px 32px 50vh;
    outline: none;
  }
  #editor p { margin: 0 0 1em; }
  #editor h1 { font-size: 1.7em; margin: .6em 0 .4em; }
  #editor h2 { font-size: 1.35em; margin: .6em 0 .4em; }
  #editor blockquote {
    margin: 1em 0; padding-left: 1em; border-left: 3px solid var(--border);
    color: var(--neutral); font-style: italic;
  }

  #statusbar {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-top: 1px solid var(--border);
    color: var(--neutral); font-size: 12px;
  }
  #statusbar .dot { opacity: .5; }
  .session-bar-wrap { width: 120px; height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; }

  #exit-focus {
    display: none; position: absolute; top: 14px; right: 18px; z-index: 30;
    border: 1px solid var(--border); background: var(--bg); color: var(--fg);
    border-radius: 20px; padding: 6px 14px; cursor: pointer; opacity: .5;
  }
  #exit-focus:hover { opacity: 1; }

  /* ---------- Focus mode ---------- */
  body.focus-mode #sidebar { display: none; }
  body.focus-mode #toolbar { display: none; }
  body.focus-mode #statusbar { opacity: 0; transition: opacity .2s; }
  body.focus-mode #main:hover #statusbar { opacity: 1; }
  body.focus-mode #exit-focus { display: block; }
  body.focus-mode #editor { padding-top: 12vh; }
  body.focus-mode #editor > * { transition: opacity .25s ease; }
  body.focus-mode #editor > *:not(.cur-block) { opacity: .25; }

  body.locked #editor { caret-color: transparent; }
</style>
</head>
<body>
  <div id="app"></div>
  <script src="./app.js"></script>
</body>
</html>
